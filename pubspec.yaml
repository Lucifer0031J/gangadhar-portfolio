name: gangadhar_portfolio
description: Gangadhar Poosarla - Application Security Engineer Portfolio
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.5.0
  url_launcher: ^6.3.0
  smooth_page_indicator: ^1.1.0
  visibility_detector: ^0.4.0+2
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
